name: Estabilizacao Pipeline

on:
  push:
    branches:
      - staging

jobs:
  stabilization:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y g++
          sudo apt-get install -y cppcheck
          sudo apt-get install -y zip

      - name: Compilar testes
        run: |
          g++ tests/BancoTest.cpp \
          src/business/Banco.cpp \
          src/business/ServicoBanco.cpp \
          src/model/Conta.cpp \
          src/model/ContaBonus.cpp \
          src/model/ContaPoupanca.cpp \
          -Iinclude \
          -o testes

      - name: Analise estatica
        run: |
          cppcheck src include \
          --enable=all \
          --suppress=missingIncludeSystem \
          --error-exitcode=0

      - name: Executar testes
        run: ./testes

      - name: Criar RC
        id: rc
        run: |
          git fetch --tags

          # 1. Identificar a branch de origem através do log de merge
          COMMIT_MSG=$(git log -1 --pretty=%B)
          ORIGIN_BRANCH="unknown"

          if [[ "$COMMIT_MSG" == *"bugfix/"* ]]; then
            ORIGIN_BRANCH="bugfix"
          elif [[ "$COMMIT_MSG" == *"main"* ]] || [[ "$COMMIT_MSG" == *"master"* ]]; then
            ORIGIN_BRANCH="main"
          else
            # Fallback seguro caso a mensagem não seja padrão
            if git branch -r --contains HEAD | grep -q "origin/main"; then
              ORIGIN_BRANCH="main"
            else
              ORIGIN_BRANCH="bugfix"
            fi
          fi

          echo "Origem detectada para a regra: $ORIGIN_BRANCH"

          # 2. Buscar a última tag válida do padrão rc-
          LAST_TAG=$(git tag | grep "^rc-" | sort -V | tail -n 1)

          # Se for a PRIMEIRA RC do projeto, inicia estritamente em rc-1.0
          if [ -z "$LAST_TAG" ]; then
            NEW_TAG="rc-1.0"
          else
            VERSION=${LAST_TAG#rc-}

            # Separa os dígitos por pontos em um array
            IFS='.' read -r -a VERSION_PARTS <<< "$VERSION"
            
            X=${VERSION_PARTS[0]}
            Y=${VERSION_PARTS[1]}
            Z=${VERSION_PARTS[2]}

            [ -z "$X" ] && X=1
            [ -z "$Y" ] && Y=0
            [ -z "$Z" ] && Z=0

            # Aplicação das regras baseadas na origem
            if [ "$ORIGIN_BRANCH" = "main" ]; then
              # main -> staging  => rc-X.Y
              Y=$((Y + 1))
              NEW_TAG="rc-$X.$Y"
            else
              # bugfix/* -> staging => rc-X.Y.Z
              Z=$((Z + 1))
              NEW_TAG="rc-$X.$Y.$Z"
            fi
          fi

          echo "Nova tag gerada: $NEW_TAG"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

          # 3. Validação de segurança (Problema Conceitual de Duplicidade)
          if git tag -l | grep -q "^${NEW_TAG}$"; then
          echo "Erro: A tag $NEW_TAG já existe."
          exit 1
          fi

          # Configurar Git e subir a Tag gerada com segurança
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: Gerar pacote ZIP
        run: |
          zip -r "${{ steps.rc.outputs.tag }}.zip" \
          src \
          include \
          tests \
          README.md

      - name: Publicar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rc.outputs.tag }}
          path: ${{ steps.rc.outputs.tag }}.zip